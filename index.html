<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小宇宙播客笔记生成器</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
    background: #0a0a0f;
    color: #e0e0e8;
    min-height: 100vh;
    padding: 60px 20px 80px;
  }

  /* 背景网格纹理 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(74,108,247,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(74,108,247,.04) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 780px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  /* ── 顶部 Hero ── */
  .hero {
    text-align: center;
    margin-bottom: 52px;
  }

  .hero-tag {
    display: inline-block;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #6b7aff;
    border: 1px solid rgba(107,122,255,.35);
    border-radius: 20px;
    padding: 4px 14px;
    margin-bottom: 20px;
  }

  h1 {
    font-size: clamp(2.2rem, 6vw, 3.4rem);
    font-weight: 900;
    line-height: 1.1;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #a0b4ff 0%, #6b7aff 40%, #38beff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 14px;
  }

  .subtitle {
    font-size: 0.95rem;
    color: #6b7080;
    letter-spacing: 0.01em;
  }

  /* ── 卡片 ── */
  .card {
    background: rgba(255,255,255,.03);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 16px;
    padding: 28px 32px;
    margin-bottom: 16px;
    backdrop-filter: blur(8px);
  }

  .card-label {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #4a6cf7;
    margin-bottom: 12px;
  }

  input[type=text] {
    width: 100%;
    padding: 12px 16px;
    background: rgba(255,255,255,.05);
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 10px;
    font-size: 0.93rem;
    color: #e0e0e8;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
    margin-bottom: 20px;
    font-family: inherit;
  }
  input[type=text]::placeholder { color: #40404a; }
  input[type=text]:focus {
    border-color: rgba(107,122,255,.6);
    box-shadow: 0 0 0 3px rgba(107,122,255,.12);
  }

  /* 主按钮：仿 "Enter the Matrix" */
  #btn {
    width: 100%;
    padding: 14px 24px;
    background: transparent;
    border: 1px solid rgba(107,122,255,.5);
    border-radius: 10px;
    font-size: 0.82rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #a0b4ff;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: border-color .25s, color .25s, box-shadow .25s;
  }
  #btn::after {
    content: ' →';
    opacity: 0.7;
  }
  #btn:hover:not(:disabled) {
    border-color: #6b7aff;
    color: #fff;
    box-shadow: 0 0 24px rgba(107,122,255,.25);
  }
  #btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  /* ── 进度日志 ── */
  .log {
    font-size: 0.8rem;
    color: #505060;
    line-height: 1.9;
    white-space: pre-wrap;
    font-family: "SFMono-Regular", Menlo, monospace;
    min-height: 48px;
  }
  .log-line-ok   { color: #4ade80; }
  .log-line-err  { color: #f87171; }
  .log-line-info { color: #60a5fa; }

  /* ── 结果区 ── */
  .result-wrap { display: none; }

  .result-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    gap: 8px;
  }
  .result-header-title {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #4a6cf7;
  }
  .action-btns { display: flex; gap: 8px; }

  .copy-btn {
    width: auto;
    padding: 6px 16px;
    background: transparent;
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 8px;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #80809a;
    cursor: pointer;
    transition: border-color .2s, color .2s;
  }
  .copy-btn:hover {
    border-color: rgba(107,122,255,.5);
    color: #a0b4ff;
  }

  /* ── 笔记输出内容 ── */
  #output {
    font-size: 0.85rem;
    line-height: 1.8;
    color: #b0b0c4;
    max-height: 72vh;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: rgba(107,122,255,.3) transparent;
  }
  #output::-webkit-scrollbar { width: 4px; }
  #output::-webkit-scrollbar-thumb { background: rgba(107,122,255,.3); border-radius: 4px; }

  #output h1 {
    font-size: 1.1rem;
    font-weight: 800;
    text-align: center;
    color: #d0d4ff;
    margin: 0 0 16px;
  }
  #output h2 {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #6b7aff;
    margin: 2em 0 0.7em;
    padding-bottom: 7px;
    border-bottom: 1px solid rgba(107,122,255,.2);
  }
  #output h3 {
    font-size: 0.87rem;
    font-weight: 700;
    color: #c0c8ff;
    margin: 1.2em 0 0.35em;
  }
  #output p { margin: 0.5em 0; }
  #output ul, #output ol { padding-left: 1.3em; margin: 0.4em 0; }
  #output li { margin: 0.35em 0; }
  #output li strong:first-child { color: #8899ff; }
  #output strong { color: #c8d0ff; font-weight: 700; }

  #output blockquote {
    margin: 1em 0;
    padding: 10px 16px;
    background: rgba(56,190,255,.05);
    border-left: 3px solid #38beff;
    border-radius: 0 6px 6px 0;
    color: #80b8d0;
    font-style: italic;
  }
  #output hr {
    border: none;
    border-top: 1px solid rgba(255,255,255,.06);
    margin: 1.2em 0;
  }
  #output code {
    background: rgba(107,122,255,.15);
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 0.82em;
    color: #a0b4ff;
  }
</style>
</head>
<body>
<div class="container">

  <!-- Hero -->
  <div class="hero">
    <div class="hero-tag">AI · Podcast · Notes</div>
    <h1>小宇宙播客<br>笔记生成器</h1>
    <p class="subtitle">粘贴单集链接，自动转录，AI 提炼结构化笔记</p>
  </div>

  <!-- 输入卡片 -->
  <div class="card">
    <div class="card-label">Episode URL</div>
    <input type="text" id="url" placeholder="https://www.xiaoyuzhoufm.com/episode/...">
    <button id="btn" onclick="generate()">生成笔记</button>
  </div>

  <!-- 进度卡片 -->
  <div class="card">
    <div class="card-label">Progress</div>
    <div class="log" id="log">等待开始…</div>
  </div>

  <!-- 结果卡片 -->
  <div class="card result-wrap" id="result-wrap">
    <div class="result-header">
      <div class="result-header-title">Output</div>
      <div class="action-btns">
        <button class="copy-btn" onclick="exportPDF()">导出 PDF</button>
        <button class="copy-btn" onclick="copyResult()">复制全文</button>
      </div>
    </div>
    <div id="output"></div>
  </div>

</div>

<script>
let running = false;
let rawText = '';

function log(msg) {
  const el = document.getElementById('log');
  const line = document.createElement('div');
  if (msg.startsWith('✅')) line.className = 'log-line-ok';
  else if (msg.startsWith('❌')) line.className = 'log-line-err';
  else line.className = 'log-line-info';
  line.textContent = msg;
  if (el.textContent === '等待开始…') el.textContent = '';
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

async function generate() {
  if (running) return;
  const url = document.getElementById('url').value.trim();
  if (!url) { alert('请输入小宇宙链接'); return; }

  running = true;
  document.getElementById('btn').disabled = true;
  const logEl = document.getElementById('log');
  logEl.textContent = '';
  document.getElementById('output').innerHTML = '';
  rawText = '';
  document.getElementById('result-wrap').style.display = 'none';

  try {
    const resp = await fetch('/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ episode_url: url }),
    });

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      let event = '', data = '';
      for (const line of lines) {
        if (line.startsWith('event: ')) event = line.slice(7).trim();
        else if (line.startsWith('data: ')) data = line.slice(6);
        else if (line === '' && event) {
          handle(event, data);
          event = ''; data = '';
        }
      }
    }
  } catch(e) {
    log('❌ 网络错误：' + e.message);
  } finally {
    running = false;
    document.getElementById('btn').disabled = false;
  }
}

function handle(event, data) {
  const out = document.getElementById('output');
  const wrap = document.getElementById('result-wrap');

  if (event === 'progress') {
    log(data);
  } else if (event === 'chunk') {
    wrap.style.display = 'block';
    rawText += data;
    // 确保 ## 标题前有换行，避免 DeepSeek 流式输出时标题粘连
    const normalized = rawText.replace(/(^|\S)(#{1,3} )/gm, '$1\n\n$2');
    out.innerHTML = marked.parse(normalized);
    out.scrollTop = out.scrollHeight;
  } else if (event === 'done') {
    const d = JSON.parse(data);
    log(`✅ 完成：${d.title}`);
  } else if (event === 'error') {
    log('❌ ' + data);
  }
}

function copyResult() {
  navigator.clipboard.writeText(rawText).then(() => alert('已复制到剪贴板'));
}

function exportPDF() {
  const content = document.getElementById('output').innerHTML;
  const win = window.open('', '_blank');
  win.document.write(`<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>播客笔记</title>
<style>
  body { font-family: "PingFang SC","Helvetica Neue",sans-serif; font-size:14px; line-height:1.8; color:#1a1a1a; max-width:740px; margin:40px auto; padding:0 24px; }
  h1 { font-size:22px; margin-bottom:4px; }
  h2 { font-size:13px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:#4a6cf7; border-bottom:1px solid #e0e4ff; padding-bottom:6px; margin-top:2em; }
  h3 { font-size:15px; color:#333; }
  ul,ol { padding-left:20px; } li { margin:4px 0; }
  blockquote { border-left:3px solid #38beff; padding-left:14px; color:#555; font-style:italic; }
  strong { color:#2a2a4a; }
</style>
</head><body>${content}</body></html>`);
  win.document.close();
  win.focus();
  setTimeout(() => { win.print(); win.close(); }, 500);
}
</script>
</body>
</html>
